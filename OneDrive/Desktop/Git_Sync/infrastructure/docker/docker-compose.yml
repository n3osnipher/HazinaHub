version: "3.8"

services:
  postgres:
    image: postgres:16-alpine
    container_name: hazinahub-db
    environment:
      POSTGRES_DB: hazinahub
      POSTGRES_USER: hazinahub
      POSTGRES_PASSWORD: ${DB_PASSWORD:-hazinahub_dev}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./../../apps/api/src/database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hazinahub"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ../../
      dockerfile: infrastructure/docker/Dockerfile.api
    container_name: hazinahub-api
    ports:
      - "5000:5000"
    env_file:
      - ../../.env
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ../../apps/api/src:/app/apps/api/src

  web:
    build:
      context: ../../
      dockerfile: infrastructure/docker/Dockerfile.web
    container_name: hazinahub-web
    ports:
      - "3000:3000"
    env_file:
      - ../../.env
    depends_on:
      - api

  nginx:
    image: nginx:alpine
    container_name: hazinahub-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ../nginx/nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      - api
      - web

volumes:
  pgdata:
